name: Update Fork
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/acvigue/esphome-levoit-air-purifier.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
